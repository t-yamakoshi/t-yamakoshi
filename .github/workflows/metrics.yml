name: Generate metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: t-yamakoshi
          template: classic
          base: ""
          filename: image/metrics-languages.svg
          config_timezone: Asia/Tokyo
          plugin_languages: yes
          plugin_languages_ignored: >-
            html, css, scss, makefile, jupyter notebook, dockerfile,
            shell, tex, roff, vim script
          plugin_languages_details: percentage, bytes-size
          plugin_languages_limit: 8
          plugin_languages_analysis_timeout: 15

      - name: Topics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: t-yamakoshi
          template: classic
          base: ""
          filename: image/metrics-topics.svg
          config_timezone: Asia/Tokyo
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons

      - name: Followup
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: t-yamakoshi
          template: classic
          base: ""
          filename: image/metrics-followup.svg
          config_timezone: Asia/Tokyo
          plugin_followup: yes
          plugin_followup_sections: repositories
