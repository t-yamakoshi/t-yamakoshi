name: Generate metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate languages SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: t-yamakoshi
          template: classic
          base: ""
          filename: metrics-languages.svg
          output_action: none
          config_timezone: Asia/Tokyo
          plugin_languages: yes
          plugin_languages_ignored: >-
            html, css, scss, makefile, jupyter notebook, dockerfile,
            shell, tex, roff, vim script
          plugin_languages_details: percentage, bytes-size
          plugin_languages_limit: 8
          plugin_languages_analysis_timeout: 15

      - name: Generate topics SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: t-yamakoshi
          template: classic
          base: ""
          filename: metrics-topics.svg
          output_action: none
          config_timezone: Asia/Tokyo
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons

      - name: Generate followup SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: t-yamakoshi
          template: classic
          base: ""
          filename: metrics-followup.svg
          output_action: none
          config_timezone: Asia/Tokyo
          plugin_followup: yes
          plugin_followup_sections: repositories

      - name: Commit metrics
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add metrics-*.svg
          if git diff --staged --quiet; then
            echo "No metrics changes."
          else
            git commit -m "chore: update metrics SVGs"
            git push
          fi
